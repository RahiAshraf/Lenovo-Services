<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Lenovo Service Center in Serlingampalli, Hyderabad for laptop, desktop, repair, booking and support.">
    <title>Lenovo Service Center | Contact</title>
    <link rel="icon" type="image/svg+xml" href="images/lenovo-logo.svg">
    <meta name="theme-color" content="#E2231A">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div id="site-header"></div>

    <section class="container-bg">
    <div class="container">

        <div class="row g-5 align-items-center">

            <div class="col-lg-5">

                <h1 class="section-title mb-3">Contact Lenovo Support</h1>

                <p class="section-subtitle mb-4">
                    Serlingampalli, Hyderabad
                </p>

                <div class="feature-row mb-3">
                    <i class="fa-solid fa-phone me-3"></i>
                    +91 90354 67890
                </div>

                <div class="feature-row mb-3">
                    <i class="fa-solid fa-envelope me-3"></i>
                    support@lenovocarepro.com
                </div>

                <div class="feature-row mb-3">
                    <i class="fa-solid fa-clock me-3"></i>
                    Mon - Sat | 9:00 AM - 8:00 PM
                </div>

            </div>

            <div class="col-lg-7">

                <div class="premium-card p-4">

                    <form class="needs-validation" novalidate>

                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-control" placeholder="Your Name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Your Email" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Message</label>
                            <textarea class="form-control" rows="6" placeholder="Enter your message" required></textarea>
                        </div>

                        <button class="btn btn-brand">
                            Send Message
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>
</section>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
