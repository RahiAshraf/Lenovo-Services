<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Lenovo Service Center in Serlingampalli, Hyderabad for laptop, desktop, repair, booking and support.">
    <title>Lenovo Service Center | Login</title>
    <link rel="icon" type="image/svg+xml" href="images/lenovo-logo.svg">
    <meta name="theme-color" content="#E2231A">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div id="site-header"></div>

    <section class="lenovo-login">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="premium-card p-4">
                        <h1>Login</h1>
                        <p class="muted">Access your repair dashboard.</p>
                        <form class="needs-validation" data-success="Login successful." data-redirect="dashboard.html"
                            novalidate>
                            <div class="mb-3"><label class="form-label">Email</label><input type="email"
                                    class="form-control" id="email" placeholder="name@example.com" required>
                                <div class="invalid-feedback">Please enter valid email.</div>
                            </div>
                            <div class="mb-3"><label class="form-label">Password</label><input type="password"
                                    class="form-control" id="password" placeholder="Password" required>
                                <div class="invalid-feedback">Please enter valid password.</div>
                            </div><button class="btn btn-brand w-100">Login</button>
                            <p class="mt-3 muted">No account? <a href="register.html">Register</a></p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
