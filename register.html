<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Lenovo Service Center in Serlingampalli, Hyderabad for laptop, desktop, repair, booking and support.">
    <title>Lenovo Service Center | Register</title>
    <link rel="icon" type="image/svg+xml" href="images/lenovo-logo.svg">
    <meta name="theme-color" content="#E2231A">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div id="site-header"></div>

    <section class="lenovo-register">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="premium-card p-4">
                        <h1>Create Account</h1>
                        <form class="needs-validation" data-success="Account created." data-redirect="dashboard.html"
                            novalidate>
                            <div class="mb-3"><label class="form-label">Full Name</label><input type="text"
                                    class="form-control" id="name" placeholder="Your name" required>
                                <div class="invalid-feedback">Please enter valid full name.</div>
                            </div>
                            <div class="mb-3"><label class="form-label">Email</label><input type="email"
                                    class="form-control" id="email" placeholder="name@example.com" required>
                                <div class="invalid-feedback">Please enter valid email.</div>
                            </div>
                            <div class="mb-3"><label class="form-label">Phone</label><input type="tel"
                                    class="form-control" id="phone" placeholder="Mobile number" required>
                                <div class="invalid-feedback">Please enter valid phone.</div>
                            </div>
                            <div class="mb-3"><label class="form-label">Password</label><input type="password"
                                    class="form-control" id="password" placeholder="Minimum 8 characters" required>
                                <div class="invalid-feedback">Please enter valid password.</div>
                            </div><button class="btn btn-brand w-100">Register</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
