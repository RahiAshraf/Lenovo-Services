<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Lenovo Service Center in Serlingampalli, Hyderabad for laptop, desktop, repair, booking and support.">
    <title>Lenovo Service Center | Booking</title>
    <link rel="icon" type="image/svg+xml" href="images/lenovo-logo.svg">
    <meta name="theme-color" content="#E2231A">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div id="site-header"></div>

    <section class="booking-bg">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="premium-card p-4 p-lg-5">
                        <h1>Book Lenovo Service</h1>
                        <p class="muted">Enter accurate details for faster diagnosis.</p>
                        <form class="needs-validation" data-success="Service booking created. Redirecting to payment."
                            data-redirect="payment.html" novalidate>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="mb-3"><label class="form-label">Full Name</label><input type="text"
                                            class="form-control" id="fullName" placeholder="Your full name" required>
                                        <div class="invalid-feedback">Please enter valid full name.</div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="mb-3"><label class="form-label">Phone</label><input type="tel"
                                            class="form-control" id="phone" placeholder="10-digit mobile" required>
                                        <div class="invalid-feedback">Please enter valid phone.</div>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3"><label class="form-label">Email</label><input type="email"
                                    class="form-control" id="email" placeholder="name@example.com" required>
                                <div class="invalid-feedback">Please enter valid email.</div>
                            </div>
                            <div class="row">
                                <div class="col-md-6"><label class="form-label">Device Type</label><select
                                        class="form-select mb-3" required>
                                        <option value="">Choose</option>
                                        <option>Laptop</option>
                                        <option>Desktop</option>
                                        <option>Gaming Laptop</option>
                                        <option>Workstation</option>
                                        <option>Accessory</option>
                                    </select></div>
                                <div class="col-md-6">
                                    <div class="mb-3"><label class="form-label">Preferred Date</label><input type="date"
                                            class="form-control" id="serviceDate" placeholder="" required>
                                        <div class="invalid-feedback">Please enter valid preferred date.</div>
                                    </div>
                                </div>
                            </div><label class="form-label">Issue Description</label><textarea class="form-control mb-3"
                                rows="4" placeholder="Describe your issue" required></textarea><button
                                class="btn btn-brand w-100">Continue to Payment</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
