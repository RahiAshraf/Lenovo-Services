<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Lenovo Service Center in Serlingampalli, Hyderabad for laptop, desktop, repair, booking and support.">
    <title>Lenovo Service Center | Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="images/lenovo-logo.svg">
    <meta name="theme-color" content="#E2231A">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>

<body>
    <div id="site-header"></div>

    <section>
        <div class="container">
            <h1 class="section-title">Customer Dashboard</h1>
            <p class="muted">Track your Lenovo service request.</p>
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="metric">
                        <h3>BK-1024</h3>
                        <p>Booking ID</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="metric">
                        <h3>In Review</h3>
                        <p>Repair Status</p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="metric">
                        <h3>₹999</h3>
                        <p>Advance Paid</p>
                    </div>
                </div>
            </div>
            <div class="premium-card p-4 mt-4">
                <h4>Recent Service Requests</h4>
                <div class="table-responsive">
                    <table class="table table-darkish">
                        <thead>
                            <tr>
                                <th>Device</th>
                                <th>Issue</th>
                                <th>Status</th>
                                <th>Payment</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Lenovo Laptop</td>
                                <td>Heating / Slow performance</td>
                                <td>Diagnosis</td>
                                <td>Paid</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
